# Atlas P2 — Grafana dashboard provider.
# Loads JSON dashboards from this same provisioning dir.
apiVersion: 1

providers:
  - name: atlas
    orgId: 1
    folder: Atlas
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
