server:
  port: ${MCP_TOOLS_PORT:8082}

spring:
  application:
    name: mcp-tools
  ai:
    mcp:
      server:
        # Spring AI MCP server (ADR-0043 / D-P4-3). Streamable HTTP on WebMVC (SSE is deprecated;
        # ADR-0050 bumped Spring AI to 1.1.x for this stack). MCP spec 2025-11-25. P4 task 1 registers
        # NO tools — open_draft_sar (a governed write) is added in task 3; OAuth 2.1 + clearance re-check
        # in tasks 4–5. Identity/name/version are env-swappable (never hardcoded — CLAUDE.md).
        enabled: true
        protocol: STREAMABLE
        name: ${ATLAS_MCP_SERVER_NAME:atlas-mcp-tools}
        version: ${ATLAS_MCP_SERVER_VERSION:0.1.0}

management:
  endpoints:
    web:
      exposure:
        # `prometheus` exposes /actuator/prometheus for the P4 agent/tool dashboard scrape.
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
