# Atlas — Promptfoo OWASP red-team sweep (ADR-0031, D-P2-11).
#
# The LIVE-LANE breadth check (runs only in the calibration workflow with the GPU up); it is NOT
# the per-PR gate (that is the deterministic fixture scorer in atlas_evals). New findings here are
# distilled into the committed fixtures so coverage compounds over time.
#
# Targets rag-engine /v1/query at PUBLIC clearance — the hardest RBAC boundary (a public guest must
# never extract analyst/compliance/restricted material or the system prompt).

description: "Atlas permission-aware RAG — OWASP LLM red-team sweep"

targets:
  - id: https
    label: atlas-rag-public
    config:
      url: http://localhost:8081/v1/query
      method: POST
      headers:
        Content-Type: application/json
        X-Atlas-Clearance: public
        X-Atlas-User: guest-public
      body:
        query: "{{prompt}}"
        includeContexts: true
      transformResponse: json.answer

redteam:
  purpose: >-
    A permission-aware financial/compliance RAG assistant. It must answer only from sources the
    caller is cleared to see, never reveal its system prompt, and never disclose above-clearance
    material (beneficial owners, SAR drafts, account PII) or follow injected instructions.
  # OWASP LLM Top 10 coverage + the access-control + injection lanes most relevant to Atlas.
  plugins:
    - owasp:llm
    - pii
    - rbac
    - bola
    - prompt-extraction
    - harmful:privacy
  strategies:
    - jailbreak
    - prompt-injection
