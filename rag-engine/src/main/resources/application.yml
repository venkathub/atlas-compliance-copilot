server:
  port: ${RAG_ENGINE_PORT:8081}

spring:
  application:
    name: rag-engine
  datasource:
    # pgvector store + RBAC metadata. Env-driven, never hardcoded (CLAUDE.md).
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:atlas}}
    username: ${POSTGRES_USER:atlas}
    password: ${POSTGRES_PASSWORD:atlas}
  flyway:
    # Versioned, reproducible schema migrations (P1). Runs on startup against the datasource.
    enabled: true
    locations: classpath:db/migration
  ai:
    ollama:
      # Remote GPU endpoint — env-swappable, never hardcoded (CLAUDE.md).
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      init:
        # The remote endpoint already hosts the models; never auto-pull at startup.
        pull-model-strategy: never
      chat:
        options:
          model: "${OLLAMA_CHAT_MODEL:qwen2.5:3b-instruct}"
          keep-alive: 30m   # keep the model resident to avoid GPU cold starts
      embedding:
        options:
          model: "${OLLAMA_EMBED_MODEL:nomic-embed-text}"

management:
  endpoints:
    web:
      exposure:
        # `prometheus` exposes /actuator/prometheus for the P2 Prometheus scrape.
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
  # OTel tracing (P2, ADR-0030). gen_ai.* spans export over OTLP to Langfuse. Export is
  # OPT-IN via OTEL_TRACES_EXPORT_ENABLED (default false) so tests/CI never try to reach
  # Langfuse; spans are still created in-process. Langfuse needs Basic auth — see RUNBOOK §6.
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLING_PROBABILITY:1.0}
    export:
      enabled: ${OTEL_TRACES_EXPORT_ENABLED:false}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:3000/api/public/otel/v1/traces}
      headers:
        Authorization: ${LANGFUSE_OTEL_AUTH_HEADER:}

# Ingestion pipeline (P1). All env-swappable; chunk sizing per ADR-0011, dim per ADR-0005.
atlas:
  ingest:
    layer1-manifest: ${ATLAS_INGEST_LAYER1_MANIFEST:classpath:corpus/layer1/manifest.json}
    layer2-glob: ${ATLAS_INGEST_LAYER2_GLOB:classpath:corpus/layer2/*.md}
    chunk-size: ${ATLAS_INGEST_CHUNK_SIZE:512}
    chunk-overlap: ${ATLAS_INGEST_CHUNK_OVERLAP:64}
    embedding-dim: ${EMBED_DIM:768}
    trusted-origins: ${ATLAS_INGEST_TRUSTED_ORIGINS:classpath:corpus/,classpath:/corpus/}
  # P1-only clearance-transport shim (ADR-0016). Profile-gated to local/test; the P3 IdP supersedes it.
  security:
    clearance-users: ${ATLAS_SECURITY_CLEARANCE_USERS:classpath:dev/clearance-users.json}
    header-user: ${ATLAS_SECURITY_HEADER_USER:X-Atlas-User}
    header-clearance: ${ATLAS_SECURITY_HEADER_CLEARANCE:X-Atlas-Clearance}
    default-clearance: ${ATLAS_SECURITY_DEFAULT_CLEARANCE:public}
  # Hybrid retrieval tuning (ADR-0013 RRF). All env-swappable.
  retrieval:
    dense-k: ${ATLAS_RETRIEVAL_DENSE_K:20}
    sparse-k: ${ATLAS_RETRIEVAL_SPARSE_K:20}
    rrf-k: ${ATLAS_RETRIEVAL_RRF_K:60}
    top-k: ${ATLAS_RETRIEVAL_TOP_K:6}
  # Prompt-injection guardrail (LLM01, ADR-0015). Default phrase set is in code; override to extend.
  guardrail:
    enabled: ${ATLAS_GUARDRAIL_ENABLED:true}
  # Trace content-capture policy (P2, ADR-0030 / D-P2-10). 'off' (default) = metadata only
  # (ids/clearance/model/token/latency, NO chunk text or PII). 'full' = redaction-filtered
  # prompt/response capture, LOCAL DEV ONLY — never a shared/prod stack.
  trace:
    content: ${ATLAS_TRACE_CONTENT:off}
