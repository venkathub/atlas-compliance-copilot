# ── Atlas QLoRA run config (PINNED CONTRACT) ──────────────────────────────────────────────────
# THE reproducibility contract for P6. A fine-tune re-run from this committed file reproduces the
# adapter (modulo float nondeterminism). config.load() fails fast if any required field below is
# missing/unpinned. Base-model & quant choices: ADR-0070 (Qwen2.5-7B) / ADR-0069 (QLoRA 4-bit NF4).
# This is the PRODUCTION run config; qlora_qwen3b_smoke.yaml is the fast pipeline-shakedown variant.

base_model: Qwen/Qwen2.5-7B-Instruct          # ADR-0070: matches the agent/serving family (P7 tiering)

quant:                                         # ADR-0069: 4-bit NF4 + double-quant, bf16 compute
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  double_quant: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

train:
  epochs: 3
  lr: 2.0e-4
  batch_size: 4
  grad_accum: 4
  max_seq_len: 2048
  seed: 42

early_stopping:
  metric: eval_loss
  patience: 2
  min_delta: 0.005

dataset:
  manifest: data/manifest.json
  train: data/train.jsonl
  val: data/val.jsonl

mlflow:
  experiment: atlas-citation-ft
  run_name: qlora-qwen7b
  register_as: atlas-citation-adapter
