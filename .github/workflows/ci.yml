name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: Java build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # `verify` runs unit tests (surefire) + Testcontainers ITs (failsafe) — the
      # GitHub runner has Docker, so the pgvector schema/ingestion ITs run here. The
      # live Ollama IT is gated behind the `live` JUnit tag/profile, so CI needs no GPU.
      - name: Build & test
        run: mvn -B verify
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/*
            **/target/failsafe-reports/*
          if-no-files-found: ignore

  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Ruff lint
        run: |
          uvx ruff check evals
          uvx ruff check infra/gpu
          uvx ruff check agents
      - name: Pytest (evals harness)
        # uv run respects evals/.python-version (3.12) + dependency groups; the heavy
        # `ragas` group is NOT installed (not a default group), proving the suite is light.
        run: uv run --directory evals --with pytest pytest -q
      - name: Pytest (GPU lifecycle helper)
        run: uv run --directory infra/gpu --with pytest pytest -q
      - name: Pytest (agents — model-free; checkpointer IT uses Testcontainers/Docker)
        run: uv run --directory agents --group dev pytest -q

  evals-gate:
    name: Eval gate (RAGAS + adversarial, cassette-replay)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      # The MERGE GATE. Replays committed cassettes (data/cassettes) against baseline.json:
      # RAGAS floors + no-regression band + 100%-pass adversarial. NO GPU, NO Ollama, and
      # RAGAS is NOT installed (replay reads per-sample score cassettes). Non-zero exit blocks merge.
      - name: Run eval merge gate
        run: uv run --directory evals python -m atlas_evals.gate
      # Eval-through-Gateway (R2): the SAME gate with the harness pointed at the Gateway client path
      # (auth + route + cache + redaction). Replays the committed cassettes (keyed by
      # question/clearance/fingerprint, not client path), so it is offline + GPU-free; the live lane
      # re-records through the real Gateway. Blocks merge on any regression on the Gateway path.
      - name: Run eval gate through the Gateway path
        env:
          ATLAS_EVAL_THROUGH_GATEWAY: "true"
        run: uv run --directory evals python -m atlas_evals.gate
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-report
          path: evals/report/*
          if-no-files-found: ignore

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  supply-chain:
    name: Vuln scan & SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Report-only for now (exit-code 0) so an upstream CVE doesn't block P0.
      # TODO: flip exit-code to 1 once the baseline is triaged (gate on CRITICAL/HIGH).
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
          format: table
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: atlas-sbom.cyclonedx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: atlas-sbom.cyclonedx.json

  image:
    name: Multi-arch image build
    runs-on: ubuntu-latest
    needs: [java]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build fat jar
        run: mvn -B -pl rag-engine -am package -DskipTests
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR (push events only)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Builds amd64+arm64 on every run (validates ARM); pushes to GHCR only on
      # push to main (not on PRs).
      - name: Build (and push on main) multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: rag-engine/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/rag-engine:latest
            ghcr.io/${{ github.repository }}/rag-engine:${{ github.sha }}
