name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: Java build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # `verify` runs unit tests only — the live Ollama IT is gated behind the
      # `live` profile, so CI never needs a GPU.
      - name: Build & unit test
        run: mvn -B verify
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/*"
          if-no-files-found: ignore

  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Ruff lint
        run: uvx ruff check evals
      - name: Pytest
        run: uvx --with pytest pytest evals -q

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  supply-chain:
    name: Vuln scan & SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Report-only for now (exit-code 0) so an upstream CVE doesn't block P0.
      # TODO: flip exit-code to 1 once the baseline is triaged (gate on CRITICAL/HIGH).
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
          format: table
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: atlas-sbom.cyclonedx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: atlas-sbom.cyclonedx.json

  image:
    name: Multi-arch image build
    runs-on: ubuntu-latest
    needs: [java]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build fat jar
        run: mvn -B -pl rag-engine -am package -DskipTests
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR (push events only)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Builds amd64+arm64 on every run (validates ARM); pushes to GHCR only on
      # push to main (not on PRs).
      - name: Build (and push on main) multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: rag-engine/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/rag-engine:latest
            ghcr.io/${{ github.repository }}/rag-engine:${{ github.sha }}
